<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR FOOD PRODUCTS - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5f7fa;
padding:20px;
}

.loginBox{
background:white;
width:100%;
max-width:380px;
padding:30px;
border-radius:18px;
box-shadow:0 4px 18px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#16a34a;
margin-bottom:5px;
}

p{
text-align:center;
color:#6b7280;
margin-bottom:25px;
}

input{
width:100%;
padding:13px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#16a34a;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.info{
background:#f0fdf4;
padding:12px;
border-radius:10px;
margin-top:15px;
font-size:14px;
color:#166534;
}
</style>
</head>

<body>

<div class="loginBox">

<h1>HR FOOD</h1>
<p>Products Admin Login</p>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<p style="
text-align:center;
margin-top:15px;
font-size:13px;
color:#6b7280;
">
HR FOOD PRODUCTS © 2026
</p>
<div class="info">
Please login using your authorized account credentials.
</div>
</div>

<script src="js/config.js"></script>

<script>
async function login(){

const username = document.getElementById("username").value.trim();
const password = document.getElementById("password").value.trim();

if(!username || !password){
alert("Enter username and password");
return;
}

const res = await fetch(`${API_URL}/login`, {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Login failed");
return;
}

localStorage.setItem("token", data.token);
localStorage.setItem("adminUser", data.username);
localStorage.setItem("userRole", data.role);

window.location.href = "dashboard.html";
}
</script>

</body>
</html>
